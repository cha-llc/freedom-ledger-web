version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      supabase:
        patterns: ["@supabase/*"]
      react-ecosystem:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      expo:
        patterns: ["expo", "expo-*", "@expo/*"]
